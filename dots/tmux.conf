# ~/.tmux.conf - durable SSH workspace for robrog (linpc, tmux 3.6).
# Lives in this dotfiles repo as tmux.conf; deploy to linpc:~/.tmux.conf.
# Reload a running server in place with prefix + r.

# -------------------------- server / terminal --------------------------
set -s escape-time 10                # fast Esc for Vim, but safer for Alt/Meta over SSH
set -s focus-events on               # let vim/editors react to focus gained/lost
set -s set-clipboard on              # copy-mode yanks reach your local clipboard via OSC 52,
                                     # even over SSH (terminal must support it; iTerm/kitty/ghostty do)
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"   # true color whatever the outer terminal calls itself

# ------------------------------- behavior ------------------------------
set -g mouse on                      # click panes, drag borders, wheel-scroll enters copy mode
set -g history-limit 50000           # scrollback lines per pane
set -g base-index 1                  # windows count from 1 — matches the keyboard row
setw -g pane-base-index 1
set -g renumber-windows on           # closing window 2 of 4 leaves 1,2,3 — no gaps
setw -g aggressive-resize on         # size to the client actually looking, not the smallest ever attached
set -g set-titles on                 # push session/window name into the terminal tab title
set -g repeat-time 200               # shorter grace period for repeatable keys (default 500 feels sticky)

# ----------------------------- keybindings -----------------------------
# prefix + r — reload this file into the running server
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# windows & splits — all open in the current pane's directory
bind x new-window      -c "#{pane_current_path}"   # note: replaces default x (kill-pane); prefix+& still kills the window
bind _ split-window -h -c "#{pane_current_path}"   # side-by-side
bind - split-window -v -c "#{pane_current_path}"   # stacked

# pane navigation — vim-style, plus b to cycle
bind b select-pane -t :.+
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# --------------------------- copy mode (vi) ----------------------------
# Copying terminal output, e.g. a few lines of `ll`:
#   prefix+[  enter copy mode          hjkl / w / G  move,  /text  search
#   v         start selection          (V = whole lines, best for command output)
#   y         yank + exit — lands in tmux buffer AND local clipboard (OSC 52)
#   prefix+]  paste inside tmux;  Cmd/Ctrl-V elsewhere
setw -g mode-keys vi
set -g status-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel   # yank and return to the prompt, like vim
bind -T copy-mode-vi r send-keys -X rectangle-toggle            # column select — e.g. just the filenames from ll

# ---------------- status bar & theme (Gruvbox Dark) ----------------
set -g @bar_bg "colour202"             # change this one value for the status bar background
set -g @bar_fg "colour233"           # change this one value for the main status text color

set -g status-position top           # top bar has no meaningful extra overhead
set -g status-interval 60            # one uptime shell per minute is enough
set -g status-left-length 60
set -g status-right-length 120
set -g status-style "fg=#{@bar_fg},bg=#{@bar_bg},dim"
set -g status-left "#[fg=#{@bar_fg},bg=#{@bar_bg},dim] #H #[fg=#{@bar_fg},bg=#{@bar_bg},dim] "
set -g status-right "#[fg=#{@bar_fg},bg=#{@bar_bg},dim]#{?pane_in_mode, vi on ,}#[fg=#{@bar_fg},bg=#{@bar_bg},dim]up #(uptime -p | sed 's/^up //') "
set -g window-status-style "fg=#{@bar_fg},bg=#{@bar_bg}"
set -g window-status-current-style "fg=#{@bar_fg},bg=colour226"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g message-style "bg=#d79921,fg=#3c3836"
set -g message-command-style "bg=#d79921,fg=#3c3836"
set -g pane-border-style "fg=#665c54"
set -g pane-active-border-style "fg=#689d6a"
set -g mode-style "bg=#458588,fg=#fbf1c7,bold"   # copy-mode selection highlight
